<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha_Calculator</title>
</head>
<body style="display: flex;justify-content:center;">
    <div style="border: solid black 1px; border-radius: 5px; height: 300px; width: 300px;">
        
        <div class="output"></div>
        <input type="text" id="inp">
        <hr>
        <div class="btns">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>0</button>
            <button id="ad">+</button>
            <button id="sub">-</button>
            <button id="mul">x</button>
            <button id="div">/</button>
            <button id="clr">clr</button>

        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
